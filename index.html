<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDL Aquiraz - Em Breve</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow: hidden;
            background-color: #000;
        }

        #hero-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* Overlay mais escuro na esquerda e sumindo para a direita */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                rgba(0, 0, 0, 0.7) 0%, 
                rgba(0, 0, 0, 0.3) 50%, 
                rgba(0, 0, 0, 0) 100%
            );
            z-index: 1;
        }

        .main-content {
            position: relative;
            z-index: 2;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: left;
            padding: 0 10%;
            animation: slideRight 1.5s ease-out;
        }

        h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            max-width: 600px;
            line-height: 1.1;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 3rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
            max-width: 500px;
            line-height: 1.6;
            color: #f8f9fa;
        }

        .btn {
            display: inline-block;
            padding: 14px 42px;
            border: 2px solid #ffffff;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 4px; 
            background: transparent;
            transition: all 0.3s ease;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn:hover {
            background: #ffffff;
            color: #000000;
            text-shadow: none;
        }

        .highlight {
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            font-weight: 800;
        }

        @keyframes slideRight {
            0% { opacity: 0; transform: translateX(-50px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 992px) {
            h1 {
                font-size: 4rem;
            }
            .main-content {
                padding: 0 5%;
            }
        }

        @media (max-width: 768px) {
            .overlay {
                background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 100%);
            }
            .main-content {
                align-items: center;
                text-align: center;
                padding: 0 2rem;
            }
            h1 {
                font-size: 3rem;
            }
            p {
                font-size: 1.2rem;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas id="hero-canvas"></canvas>
    <div class="overlay"></div>

    <main class="main-content">
        <h1>A CDL está<br>chegando<br>em <span class="highlight">Aquiraz</span></h1>
        <p>Nossa plataforma digital está sendo desenvolvida com excelência para apoiar e fortalecer os lojistas da nossa cidade.</p>
        <a href="#" class="btn">Saiba Mais</a>
    </main>

    <script>
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        
        const frameCount = 78;
        const currentFrame = index => (
            `assets/image-hero/Wind_effect_on_202603261616_${index.toString().padStart(3, '0')}.webp`
        );

        const images = [];
        const animationState = { frame: 0 };

        // Preload
        let loadedImages = 0;
        for (let i = 0; i < frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                if (loadedImages === frameCount) {
                    requestAnimationFrame(render);
                }
            };
            img.src = currentFrame(i);
            images.push(img);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function render() {
            const img = images[animationState.frame];
            
            // Draw image with "cover" behavior
            const imgRatio = img.width / img.height;
            const canvasRatio = canvas.width / canvas.height;
            let drawWidth, drawHeight, offsetX, offsetY;

            if (canvasRatio > imgRatio) {
                drawWidth = canvas.width;
                drawHeight = canvas.width / imgRatio;
                offsetX = 0;
                offsetY = (canvas.height - drawHeight) / 2;
            } else {
                drawWidth = canvas.height * imgRatio;
                drawHeight = canvas.height;
                offsetX = (canvas.width - drawWidth) / 2;
                offsetY = 0;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
            
            animationState.frame = (animationState.frame + 1) % frameCount;

            // Controle de velocidade (ex: 12 fps)
            setTimeout(() => {
                requestAnimationFrame(render);
            }, 1000 / 18)
        }
    </script>
</body>
</html>
